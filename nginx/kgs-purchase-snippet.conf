# Include inside C:\nginx\conf\nginx.conf http { } block.
# Upstream + location blocks for KGS-PURCHASE at /kgs-purchase -> 127.0.0.1:3001

upstream kgs_purchase {
    server 127.0.0.1:3001;
    keepalive 16;
}

# Inside server { listen 80; } — place BEFORE location / { }
location ^~ /kgs-purchase {
    proxy_pass http://kgs_purchase;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
}
